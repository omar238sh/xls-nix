name: Build flake and push to Cachix

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}
  schedule:
    - cron: "0 4 * * 1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            extra-sandbox-paths = /etc/os-release /usr/lib/os-release

      - name: Set up Cachix
        uses: cachix/cachix-action@v15
        with:
          name: omar238sh
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build xls-tools (pinned release binaries)
        run: nix build .#xls-tools -L --accept-flake-config

      - name: Build dslx-lsp (from source, fixed-output derivation)
        run: nix build .#dslx-lsp -L --accept-flake-config

      - name: Show full Nix build log on failure
        if: failure()
        run: |
          echo "=== Fetching full log for the failed derivation ==="
          nix log .#dslx-lsp || true

      - name: Build dev shell
        run: nix build .#devShells.x86_64-linux.default -L --accept-flake-config

      - name: Push results to Cachix
        run: |
          cachix push "omar238sh" ./result || true
