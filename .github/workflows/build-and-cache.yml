name: Build flake and push to Cachix

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}
  # Optional: rebuild weekly to pick up upstream xls-src changes and
  # re-populate the cache even without a push to this repo.
  schedule:
    - cron: "0 4 * * 1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Set up Cachix
        uses: cachix/cachix-action@v15
        with:
          # Replace with the cache name you created on cachix.org
          # (same name used in flake.nix nixConfig.extra-substituters).
          name: omar238sh
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build fetch-latest-release app
        run: nix build .#fetch-latest-release -L --accept-flake-config

      - name: Build dev shell
        run: nix build .#devShells.x86_64-linux.default -L --accept-flake-config

      # This runs real Bazel 8 in a script (see flake.nix comments) rather
      # than a hermetic Nix derivation, so its output is not a Nix store
      # path and won't be picked up by cachix-action / `cachix push`.
      - name: Build DSLX LSP from source
        run: nix run .#build-dslx-lsp --accept-flake-config -- ./dslx-lsp-out

      # cachix-action watches the Nix store during the job and pushes any
      # new paths automatically, but pushing the explicit result symlinks
      # here guarantees these three outputs are included even if caching
      # behavior changes upstream.
      - name: Push results to Cachix
        run: |
          cachix push "omar238sh" ./result || true
