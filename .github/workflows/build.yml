name: Build flake and push to Cachix

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}
  # Optional: rebuild weekly to pick up upstream xls-src changes and
  # re-populate the cache even without a push to this repo.
  schedule:
    - cron: "0 4 * * 1"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CACHIX_CACHE_NAME: omar238sh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Set up Cachix
        uses: cachix/cachix-action@v15
        with:
          # Keep this in sync with flake.nix nixConfig.extra-substituters.
          name: "$omar238sh"
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build default package (dslx-lsp)
        run: nix build .#dslx-lsp -L

      - name: Build fetch-latest-release app
        run: nix build .#fetch-latest-release -L

      - name: Build dev shell
        run: nix build .#devShells.x86_64-linux.default -L

      # cachix-action watches the Nix store during the job and pushes any
      # new paths automatically, but pushing the explicit result symlinks
      # here guarantees these three outputs are included even if caching
      # behavior changes upstream.
      - name: Push results to Cachix
        run: |
          cachix push "omar238sh" ./result || true
